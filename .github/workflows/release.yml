name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  publish-npm:
    name: Build and Publish to npm
    permissions:
      id-token: write
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          run_install: false
      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'
      - run: npm install -g npm@latest
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
      - run: |
          VERSION="${{ github.ref_name }}"
          if echo "$VERSION" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            pnpm publish --access=public --provenance --no-git-checks
          else
            TAG=$(echo "$VERSION" | sed 's/^v[0-9]*\.[0-9]*\.[0-9]*-//' | sed 's/\..*//')
            pnpm publish --access=public --provenance --no-git-checks --tag "$TAG"
          fi

  changelog:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          registry-url: https://registry.npmjs.org/
      - run: |
          if echo "${{ github.ref_name }}" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            npx changelogithub
          else
            npx changelogithub --prerelease
          fi
        env:
          GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}
